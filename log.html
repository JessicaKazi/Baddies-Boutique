<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=+, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Oswald:wght@200..700&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


</head>
<body>

    <main>
        <div class="main-container">
            <div class="heading-title-container">
                <h1 class="heading-title">Baddies Boutique</h1>
            </div>
            <div class="log-container">
              <div class="log-in-section">
                <form>
                    <h1 class="title">Log In: </h1>
                    <hr>
                        <div class="label-container">
                            <form>
                                <label for="mail">Email: </label>
                                <input id="mail" type="email" required>

                                <label for="pass">Password: </label>
                                <input id="pass" type="password" required>

                                <button type="submit" class="btn-sub-one">Submit</button>
                                <button class="btn-sub-one">Sign Up</button>
                            </form>
                        </div>
                </form> 
              </div>
            </div>
        </div>
    </main>
    
</body>
</html>
