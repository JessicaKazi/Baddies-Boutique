</head>
<body>
    <div class="third-container">
        
         <nav>
     <ul>
       <li><a href="./index.html">Home</a></li>
       <li><a href="./productpage.html">Products</a></li>

         <h1 class="second-heading-title">Check-Out</h1>
        <form >
            <div class="row">
                <div class="column">
                    <h3 class="first-title">Personal details</h3>
                    <div class="input-box">
                        <span>Full Name :</span>
                        <input type="text" placeholder="John Doe ">
                    </div>
                    <div class="input-box">
                        <span>Email :</span>
                        <input type="email" placeholder="example@example.com">
                    </div>
                    <div class="input-box">
                        <span>Address :</span>
                        <input type="text" placeholder="Room - Street - Locality">
                    </div>
                    <div class="input-box">
                        <span>City :</span>
                        <input type="text" placeholder="Johannesburg">
                    </div>

                    <div class="flex">
                        <div class="input-box">
                            <span>State :</span>
                            <input type="text" placeholder="South Africa">
                        </div>
                        <div class="input-box">
                            <span>Zip Code :</span>
                            <input type="number" placeholder="123 456">
                        </div>
                    </div>
                </div>

                <div class="column">
                    <h3 class="second-title">Payment</h3>
                    <div class="input-box">
                        <span>Cards Accepted :</span>
                        <img src="/Icon/imgcards.png" alt="A Selection of Cards Option Image">
                    </div>
                    <div class="input-box">
                        <span>Name On Card :</span>
                        <input type="text" placeholder="Mr. John Doe">
                    </div>
                    <div class="input-box">
                        <span>Credit Card Number :</span>
                        <input type="number" placeholder="1111 2222 3333 4444">
                    </div>
                    <div class="input-box">
                        <span>Exp. Month :</span>
                        <input type="text" placeholder="August">
                    </div>
                
                    <div class="flex">
                        <div class="input-box">
                            <span>Exp. Year :</span>
                            <input type="number" placeholder="2025">
                        </div>
                        <div class="input-box">
                            <span>CVV :</span>
                            <input type="number" placeholder="123">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="cards-btn">Submit</button>
        </form>
    </div>
</body>
</html>
